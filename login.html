<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="home-container">
        <div class="overlay">
            <div class="content">
                <div class="logo-badge">whopackwhopay</div>
                <h1>Login</h1>
                <p class="subtitle">เริ่ม<span
                        style="color: #3784ff; font-weight: 600;">ผลาญเงิน</span>ของคุณโดยการเข้าสู่ระบบ</p>
                <div class="button-container">


                </div>
                <form class="login-form" onsubmit="handleLogin(event)">
                    <!-- แก้ที่ใส่อีเมล -->
                    <!-- From Uiverse.io by liyaxu123 -->
                    <div class="form-control">
                        <input type="value" required>
                        <label>
                            <span style="transition-delay:0ms">U</span><span style="transition-delay:50ms">s</span><span
                                style="transition-delay:100ms">e</span><span
                                style="transition-delay:150ms">r</span><span
                                style="transition-delay:200ms">n</span><span
                                style="transition-delay:250ms">a</span><span
                                style="transition-delay:300ms">m</span><span style="transition-delay:350ms">e</span>
                        </label>
                    </div>
                    <!--password-->
                    <!-- <input class="password-box" type="password" name="password" placeholder="Password" required> -->
                    <div class="form-control">
                        <input type="value" required>
                        <label>
                            <span style="transition-delay:0ms">p</span><span style="transition-delay:50ms">a</span><span
                                style="transition-delay:100ms">s</span><span
                                style="transition-delay:150ms">s</span><span
                                style="transition-delay:200ms">w</span><span
                                style="transition-delay:250ms">o</span><span
                                style="transition-delay:300ms">r</span><span style="transition-delay:350ms">d</span>
                        </label>
                    </div>
                    <!--password-->
                    <div class="form-options">
                        <label>
                            <input type="checkbox" name="remember">
                            Remember me
                        </label>
                        <a href="#" style="color: #3784ff;">Forgot password?</a>
                    </div>
                    <button type="submit" class="login-button-home"><a style="text-decoration: none; color: white; "
                            href="home.html">เข้าสู่ระบบ</a></button>
                </form>
                <p style="margin-top: 2rem;">
                    Don't have an account?
                    <a href="register.html" style="color: #3784ff; text-decoration: none;">Sign up now</a>
                </p>
            </div>
        </div>
        
    </div>
    
</body>

</html>
