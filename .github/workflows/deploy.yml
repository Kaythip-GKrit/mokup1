name: CI-CD to My Machine

# สั่งให้ทำงานเมื่อมีการ Push โค้ดขึ้นไปที่บรานช์ main
on:
  push:
    branches: [ "main" ] 

jobs:
  build-and-deploy:
    # 📌 บรรทัดนี้แหละครับที่ระบบมันเตือนให้ใส่ เพื่อให้วิ่งมาที่เครื่องคุณ
    runs-on: self-hosted 

    steps:
    # ขั้นตอนที่ 1: ดึงโค้ดล่าสุดจาก GitHub ลงมาที่เครื่อง
    - name: Checkout Code
      uses: actions/checkout@v4

    # ขั้นตอนที่ 2: ลองสั่งให้มันทำงาน (ตัวอย่าง: สั่งเปิดดูว่ามีไฟล์อะไรบ้าง)
    - name: Test Running Command
      run: |
        echo "GitHub Actions is working on my machine!"
        dir