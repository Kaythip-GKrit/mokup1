<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhoPackWhoPay - เตรียมจัดกระเป๋าและหารค่าทริปกับเพื่อนร่วมทาง</title>
  <meta name="description" content="เพื่อนร่วมเดินทางที่จะช่วยให้การจัดกระเป๋าของคุณเป็นเรื่องง่าย พร้อมผลาญเงินไปด้วยกันอย่างเป็นระบบ">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="landing-page">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html" class="logo-link">
          <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="7" width="18" height="14" rx="2" ry="2"></rect>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
          </svg>
          <span class="logo-text">WHOPACKWHOPAY</span>
        </a>
      </div>

      <div class="nav-center">
        <ul class="nav-menu">
          <li><a href="#" class="nav-item active">Home</a></li>
          <li><a href="#" class="nav-item">About</a></li>
          <li><a href="#" class="nav-item">Item List</a></li>
          <li><a href="#" class="nav-item">Contact</a></li>
        </ul>
      </div>

      <div class="nav-right">
        <a href="login.html" class="account-link">
          <svg class="account-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span>Account</span>
        </a>
      </div>
    </nav>

    <!-- Main Content Grid -->
    <main class="hero-grid">
      <!-- Left Column: Title & CTA -->
      <div class="hero-left">
        <h1 class="hero-title" >
          <span style="color: #d49463;">SIGN IN</span><br>
          FOR PLANNING YOUR TRIP<br>
          WITH US
        </h1>
        <div class="divider-line"></div>
        <div class="cta-section">
          <a style="text-decoration: none;color:black" href="login.html">
          <button class="cta-button" onclick="navigateTo('create-trip')">
            <span>Start Trip</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
          </a>
          <p class="cta-description">
            เพื่อนร่วมเดินทางที่จะช่วยให้การจัดกระเป๋าและหารค่าทริปกลุ่มของคุณเป็นเรื่องง่าย รวดเร็ว และเป็นระบบที่สุด
          </p>
        </div>
      </div>



      <!-- Right Column: Hero Image -->
      <div class="hero-right">
        <div class="image-wrapper">
          <img src="travel_hero.png" alt="Travel Packing Setup" class="hero-image">
        </div>
      </div>
    </main>

  
  <script src="app.js"></script>
</body>
</html>
